{% extends "users/basic.html" %}

{% block content %}

<div class="container py-5">

    <h1 class="text-center mb-4">{{ movie.name }}</h1>

    <div class="row">

        <div class="col-md-5">
            <img src="{{ movie.image.url }}" class="img-fluid rounded shadow">
        </div>

        <div class="col-md-7">

            <h4>Rating</h4>
            <p>
                <i class="fas fa-star text-warning"></i> {{ movie.rating }}
            </p>

            <h4>Cast</h4>
            <p>{{ movie.cast }}</p>

            <h4>Description</h4>
            <p>{{ movie.description }}</p>

        </div>

    </div>

    <hr class="my-5">

    <h3 class="text-center mb-4">Trailer</h3>

    <div class="text-center">

        {% if youtube_id %}

        <!-- Responsive YouTube Embed -->
        <div class="ratio ratio-16x9">
            <iframe
                src="https://www.youtube.com/embed/{{ youtube_id }}?rel=0"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        {% else %}

        <p class="text-muted">Trailer currently unavailable.</p>

        {% endif %}

    </div>

    <hr class="my-5">

    <div class="text-center">
        <a href="{% url 'movies:theater_list' movie.id %}" class="btn btn-primary btn-lg">Book Tickets</a>
    </div>

</div>

{% endblock %}
